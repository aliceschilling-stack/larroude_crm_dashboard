name: Update CRM Dashboard

on:
  schedule:
      - cron: "0 11 * * *"   # 11:00 UTC (~08h BRT / 07h EDT) — antes do daily-campaign-review (09:09 BRT)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Update dashboard data
        env:
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python update_dashboard.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update dashboard $(date +'%Y-%m-%d')"
          git push
